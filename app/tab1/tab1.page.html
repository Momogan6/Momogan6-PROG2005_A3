<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Inventory List</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Search bar -->
  <ion-searchbar
    [(ngModel)]="searchKeyword"
    (ionInput)="searchItem()"
    placeholder="Search items..."
    class="ion-margin-bottom"
  ></ion-searchbar>

  <!-- Item list -->
  <ion-card *ngFor="let item of inventoryList" class="card">
    <ion-card-content>
      <div class="top">
        <h2>{{ item.item_name }}</h2>
        <div class="right-wrap">
          <span class="cat">{{ item.category }}</span>
          <!-- ✅ Featured badge (ONLY SHOW WHEN 1) -->
          <span *ngIf="item.featured_item === 1" class="featured">Featured</span>
        </div>
      </div>

      <div class="row">
        <span>Qty: {{ item.quantity }}</span>
        <span>Price: ${{ item.price }}</span>
      </div>

      <div class="status"
           [class.in]="item.stock_status == 'In Stock'"
           [class.low]="item.stock_status == 'Low Stock'"
           [class.out]="item.stock_status == 'Out of Stock'">
        {{ item.stock_status }}
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Help Button -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="primary" (click)="showHelp()">
      <ion-icon name="help-circle"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
